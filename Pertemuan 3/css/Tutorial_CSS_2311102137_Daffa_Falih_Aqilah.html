<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Media Grid</title>
    <link rel="stylesheet" href="Tutorial_CSS_2311102137_Daffa_Falih_Aqilah.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <h1><span class="blue">ONLINE</span> <span class="yellow">MEDIA</span></h1>
        <h2><span class="blue">Daffa Falih Aqilah</span> <span class="yellow">2311102137</span></h2>
    </header>

    <nav>
        <ul>
            <li>HOME</li>
            <li>STRATEGY</li>
            <li>SOLUSI</li>
            <li>MARKETING</li>
            <li>WORKSHOP</li>
            <li>OUR WORK</li>
            <li>PRODUK</li>
            <li>PARTNER</li>
            <li>INSPIRASI</li>
            <li>FAQ</li>
        </ul>
    </nav>
    
    <div style="text-align: center; margin: 20px 0;">
        <button onclick="ubahAlign()" style="padding: 10px; cursor: pointer;">Ubah Align</button>
        <button onclick="ubahBackground()" style="padding: 10px; cursor: pointer;">Ubah Background</button>
    </div>
    
    <div class="main-container">
        <div class="grid-container">
            <div class="card green">
                <i class="fas fa-chart-pie"></i>
                <p>Analytic</p>
            </div>
            <div class="card orange">
                <i class="fas fa-thermometer-half"></i>
                <p>Creative</p>
            </div>
            <div class="card red">
                <i class="fas fa-desktop"></i>
                <p>Development</p>
            </div>
            <div class="card light-blue">
                <i class="fas fa-cog"></i>
                <p>Marketing</p>
            </div>
            <div class="card yellow-orange">
                <i class="fas fa-play-circle"></i>
                <p>Media</p>
            </div>
            <div class="card green">
                <i class="fas fa-rocket"></i>
                <p>Optimitation</p>
            </div>
        </div>
    </div>

    <script src="Tutorial_CSS_2311102137_Daffa_Falih_Aqilah.js"></script>
</body>
</html>
